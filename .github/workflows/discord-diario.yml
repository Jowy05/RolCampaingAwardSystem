name: Aviso diario de Discord

# Corre en los servidores de GitHub (no necesita que nadie tenga la web abierta).
# Objetivo: ~13:00 Madrid. El cron de GitHub se retrasa a menudo (1-2h) o se omite,
# así que se programan varias horas y el script solo envía en la ventana 13-20h Madrid
# (1er intento válido); el flag diario en Firebase garantiza un único envío.
on:
  schedule:
    - cron: '0 11 * * *'   # ~13:00 Madrid en verano (CEST = UTC+2)
    - cron: '0 12 * * *'   # ~13:00 Madrid en invierno (CET = UTC+1)
    - cron: '0 13 * * *'   # red de seguridad por si GitHub retrasa/omite las anteriores
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Simular sin enviar a Discord (solo log)'
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: discord-diario
  cancel-in-progress: false

jobs:
  aviso:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Enviar aviso diario
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: node scripts/discord-diario.js
