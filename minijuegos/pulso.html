<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pulso</title>
<style>
:root{--bg:#0e151e;--panel:#15212e;--card:#1d2c3a;--line:#2b3d4f;--text:#c7d5e0;--muted:#7f95a8;--green:#2f9e44;--red:#e03131;}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,Segoe UI,Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;gap:16px;padding:18px 14px;text-align:center;}
h1{font-size:22px;margin:2px 0 0;}
.sub{font-size:12.5px;color:var(--muted);margin:0;max-width:340px;line-height:1.4;}
.score{display:flex;gap:14px;width:100%;max-width:360px;}
.sc{flex:1;background:var(--card);border:2px solid var(--line);border-radius:12px;padding:10px 6px;}
.sc .n{font-size:32px;font-weight:800;line-height:1;}
.sc .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-top:4px;}
.sc.g{border-color:var(--green);} .sc.g .n{color:var(--green);}
.sc.r{border-color:var(--red);} .sc.r .n{color:var(--red);}
.arena{width:100%;max-width:360px;}
.bar{position:relative;height:40px;background:var(--panel);border:1px solid var(--line);border-radius:20px;overflow:hidden;}
#fillG{position:absolute;left:50%;top:0;bottom:0;width:0;background:var(--green);transition:width .15s;}
#fillR{position:absolute;right:50%;top:0;bottom:0;width:0;background:var(--red);transition:width .15s;}
.mid{position:absolute;left:50%;top:0;bottom:0;width:2px;background:rgba(255,255,255,.35);transform:translateX(-1px);}
.knob{position:absolute;top:50%;left:50%;width:20px;height:20px;border-radius:50%;background:#fff;border:2px solid var(--line);transform:translate(-50%,-50%);transition:left .15s;box-shadow:0 0 8px rgba(0,0,0,.5);z-index:2;}
.msg{height:24px;font-weight:800;font-size:15px;}
.btns{display:flex;gap:14px;width:100%;max-width:360px;}
.btn{flex:1;font-size:30px;font-weight:800;color:#fff;border:none;border-radius:16px;padding:30px 0;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.btn.g{background:var(--green);} .btn.r{background:var(--red);}
.btn:active{transform:translateY(3px);filter:brightness(1.12);}
.reset{background:var(--card);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:7px 14px;cursor:pointer;font-size:12.5px;}
</style>
</head>
<body>
<h1>💪 Pulso</h1>
<p class="sub">Cada lado empuja la cuerda. Si el rival va ganando, tu +1 le resta primero; cuando llega a 0, ya sumas tú. Llena tu lado para ganar la ronda.</p>
<div class="score">
  <div class="sc g"><div class="n" id="winG">0</div><div class="lbl">Verde</div></div>
  <div class="sc r"><div class="n" id="winR">0</div><div class="lbl">Rojo</div></div>
</div>
<div class="arena"><div class="bar"><div id="fillR"></div><div id="fillG"></div><div class="mid"></div><div class="knob" id="knob"></div></div></div>
<div class="msg" id="msg"></div>
<div class="btns"><button class="btn g" id="bG">+1</button><button class="btn r" id="bR">+1</button></div>
<button class="reset" id="reset">Reiniciar</button>
<script>
var MAX=5, bal=0, wG=0, wR=0, lock=false;
function render(){
  var g=Math.max(0,bal), r=Math.max(0,-bal);
  document.getElementById("fillG").style.width=(g/MAX*50)+"%";
  document.getElementById("fillR").style.width=(r/MAX*50)+"%";
  document.getElementById("knob").style.left=(50 + bal/MAX*50)+"%";
  document.getElementById("winG").textContent=wG;
  document.getElementById("winR").textContent=wR;
}
function round(t,c){ lock=true; var m=document.getElementById("msg"); m.textContent=t; m.style.color=c; setTimeout(function(){ lock=false; if(m.textContent===t)m.textContent=""; },1100); }
function push(dir){
  if(lock)return;
  bal+=dir;
  if(bal>=MAX){ wG++; bal=0; round("Verde gana la ronda!","var(--green)"); }
  else if(bal<=-MAX){ wR++; bal=0; round("Rojo gana la ronda!","var(--red)"); }
  else { document.getElementById("msg").textContent=""; }
  render();
}
document.getElementById("bG").onclick=function(){push(1);};
document.getElementById("bR").onclick=function(){push(-1);};
document.getElementById("reset").onclick=function(){bal=0;wG=0;wR=0;document.getElementById("msg").textContent="";render();};
render();
</script>
</body>
</html>
