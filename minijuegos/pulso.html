<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js?v=2"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  @keyframes pulsoIdle { 0%,100%{ transform: translate(-50%,-50%) rotate(var(--lean,0deg)); } 50%{ transform: translate(-50%,calc(-50% - 2px)) rotate(var(--lean,0deg)); } }
  @keyframes pulsoConfetti { 0%{ transform: translateY(-20px) rotate(0deg); opacity:1; } 100%{ transform: translateY(520px) rotate(720deg); opacity:0; } }
  @keyframes pulsoFlash { 0%{ opacity:0; } 12%{ opacity:1; } 100%{ opacity:0; } }
  @keyframes pulsoPop { 0%{ transform: scale(.6); opacity:0; } 60%{ transform: scale(1.08); opacity:1; } 100%{ transform: scale(1); opacity:1; } }
</style>
</helmet>
<div ref="{{ arenaRef }}" data-screen-label="Pulso" style="position:relative; width:100%; max-width:680px; margin:0 auto; min-height:100vh; box-sizing:border-box; padding:28px 22px 34px; display:flex; flex-direction:column; align-items:center; gap:18px; font-family:'Archivo',system-ui,sans-serif; color:#c7d5e0; background:radial-gradient(120% 80% at 20% 12%, rgba(34,197,94,.16), transparent 55%), radial-gradient(120% 80% at 80% 12%, rgba(239,68,68,.16), transparent 55%), linear-gradient(180deg,#15212e,#0e151e); overflow:hidden;">

  <div style="display:flex; flex-direction:column; align-items:center; gap:4px;">
    <div style="font-family:'Anton',sans-serif; font-size:40px; letter-spacing:2px; line-height:1; white-space:nowrap; text-transform:uppercase; background:linear-gradient(90deg,#22c55e 0%,#22c55e 45%,#ef4444 55%,#ef4444 100%); -webkit-background-clip:text; background-clip:text; color:transparent;">El Pulso</div>
    <div style="font-size:13px; letter-spacing:2px; text-transform:uppercase; color:#7f95a8; font-weight:700;">Primero en llegar a +3 gana</div>
    <div style="font-family:'Anton',sans-serif; font-size:26px; letter-spacing:2px; color:#7f95a8; margin-top:2px;">[ <span style="color:#22c55e;">{{ gWins }}</span> - <span style="color:#ef4444;">{{ rWins }}</span> ]</div>
  </div>

  <!-- Scoreboard -->
  <div style="display:flex; align-items:stretch; gap:14px; width:100%;">
    <div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; padding:12px 8px; border-radius:16px; background:rgba(34,197,94,.10); border:1px solid rgba(34,197,94,.35);">
      <div style="font-size:12px; letter-spacing:2px; text-transform:uppercase; font-weight:800; color:#4ade80;">Verde</div>
      <div style="font-family:'Anton',sans-serif; font-size:54px; line-height:.9; color:#22c55e;">{{ greenScore }}</div>
    </div>
    <div style="display:flex; align-items:center; font-family:'Anton',sans-serif; font-size:30px; color:#3a3f49;">VS</div>
    <div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; padding:12px 8px; border-radius:16px; background:rgba(239,68,68,.10); border:1px solid rgba(239,68,68,.35);">
      <div style="font-size:12px; letter-spacing:2px; text-transform:uppercase; font-weight:800; color:#f87171;">Rojo</div>
      <div style="font-family:'Anton',sans-serif; font-size:54px; line-height:.9; color:#ef4444;">{{ redScore }}</div>
    </div>
  </div>

  <!-- Arena -->
  <div style="position:relative; width:100%; height:340px; overflow:hidden; border-radius:18px;">
    <!-- center glow -->
    <div ref="{{ glowRef }}" style="position:absolute; left:50%; top:120px; transform:translate(-50%,-50%); width:200px; height:200px; border-radius:50%; background:radial-gradient(circle, rgba(255,255,255,.06), transparent 70%); pointer-events:none; transition:left .34s cubic-bezier(.34,1.4,.5,1), background .25s;"></div>

    <!-- Table -->
    <div style="position:absolute; left:4%; right:4%; bottom:30px; height:20px; border-radius:6px; background:linear-gradient(180deg,#2a2e37,#1b1e25); box-shadow:0 12px 26px rgba(0,0,0,.55);"></div>
    <div style="position:absolute; left:6%; right:6%; bottom:8px; height:24px; border-radius:0 0 12px 12px; background:#13151a;"></div>

    <!-- Arm rig (SVG) -->
    <svg viewBox="0 0 640 340" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" style="position:absolute; inset:0; overflow:visible; z-index:3;">
      <defs>
        <linearGradient id="grnArm" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#4ff093"></stop>
          <stop offset="0.55" stop-color="#27c163"></stop>
          <stop offset="1" stop-color="#147f40"></stop>
        </linearGradient>
        <linearGradient id="redArm" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#ff8585"></stop>
          <stop offset="0.55" stop-color="#e53a3a"></stop>
          <stop offset="1" stop-color="#ab2121"></stop>
        </linearGradient>
        <radialGradient id="armShine" cx="0.4" cy="0.28" r="0.9">
          <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"></stop>
          <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"></stop>
        </radialGradient>
        <filter id="armSh" x="-40%" y="-40%" width="180%" height="180%">
          <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#000" flood-opacity="0.45"></feDropShadow>
        </filter>
        <linearGradient id="skin" x1="0" y1="0" x2="0.15" y2="1">
          <stop offset="0" stop-color="#f7cda2"></stop>
          <stop offset="0.5" stop-color="#e7a473"></stop>
          <stop offset="1" stop-color="#c9824f"></stop>
        </linearGradient>
        <linearGradient id="skinDark" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#d39a6a"></stop>
          <stop offset="1" stop-color="#a86c40"></stop>
        </linearGradient>
        <linearGradient id="grnSleeve" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#4ff093"></stop>
          <stop offset="0.55" stop-color="#27c163"></stop>
          <stop offset="1" stop-color="#137a3d"></stop>
        </linearGradient>
        <linearGradient id="redSleeve" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#ff8585"></stop>
          <stop offset="0.55" stop-color="#e53a3a"></stop>
          <stop offset="1" stop-color="#a81f1f"></stop>
        </linearGradient>
      </defs>

      <!-- LEFT ARM (green) -->
      <g ref="{{ leftArmRef }}">
        <g filter="url(#armSh)">
          <path d="M0,-30 C70,-34 150,-30 214,-23 Q244,-21 244,0 Q244,21 214,23 C150,30 70,34 0,30 A30,30 0 0 1 0,-30 Z" fill="url(#grnArm)"></path>
          <path d="M14,-18 C80,-24 150,-22 210,-16 Q150,-10 80,-12 C50,-13 24,-12 14,-18 Z" fill="url(#armShine)"></path>
          <ellipse cx="64" cy="2" rx="46" ry="26" fill="url(#armShine)" opacity="0.5"></ellipse>
        </g>
      </g>

      <!-- RIGHT ARM (red) -->
      <g ref="{{ rightArmRef }}">
        <g filter="url(#armSh)">
          <path d="M0,-30 C70,-34 150,-30 214,-23 Q244,-21 244,0 Q244,21 214,23 C150,30 70,34 0,30 A30,30 0 0 1 0,-30 Z" fill="url(#redArm)"></path>
          <path d="M14,-18 C80,-24 150,-22 210,-16 Q150,-10 80,-12 C50,-13 24,-12 14,-18 Z" fill="url(#armShine)"></path>
          <ellipse cx="64" cy="2" rx="46" ry="26" fill="url(#armShine)" opacity="0.5"></ellipse>
        </g>
      </g>

      <!-- CLASPED HANDS -->
      <g ref="{{ claspRef }}">
        <g ref="{{ gripInnerRef }}" filter="url(#armSh)">
          <!-- fists (palms) -->
          <rect x="-62" y="-14" width="66" height="66" rx="24" fill="url(#grnArm)"></rect>
          <rect x="-4" y="-14" width="66" height="66" rx="24" fill="url(#redArm)"></rect>
          <!-- seam -->
          <path d="M0,-12 Q4,20 0,50" stroke="#000" stroke-opacity="0.16" stroke-width="3" fill="none" stroke-linecap="round"></path>
          <!-- thumbs pressing over the front -->
          <path d="M-30,30 C-26,12 -6,8 6,16 C16,22 14,40 2,44 C-12,49 -30,46 -30,30 Z" fill="url(#grnArm)"></path>
          <path d="M30,30 C26,12 6,8 -6,16 C-16,22 -14,40 -2,44 C12,49 30,46 30,30 Z" fill="url(#redArm)" opacity="0.97"></path>
          <ellipse cx="-18" cy="22" rx="16" ry="10" fill="url(#armShine)" opacity="0.45"></ellipse>
          <ellipse cx="18" cy="22" rx="16" ry="10" fill="url(#armShine)" opacity="0.3"></ellipse>
        </g>
      </g>
    </svg>
  </div>

  <!-- Power meter -->
  <div style="position:relative; width:100%; max-width:520px; height:12px; border-radius:8px; background:#1d2028; overflow:hidden; border:1px solid #2a2e37;">
    <div ref="{{ fillRef }}" style="position:absolute; top:0; bottom:0; transition:left .34s cubic-bezier(.34,1.4,.5,1), right .34s cubic-bezier(.34,1.4,.5,1), background .2s; left:50%; right:50%; border-radius:8px;"></div>
    <div style="position:absolute; left:50%; top:-2px; bottom:-2px; width:2px; transform:translateX(-50%); background:#4b5160;"></div>
  </div>

  <!-- Buttons -->
  <div style="display:flex; gap:16px; width:100%; max-width:520px;">
    <button onClick="{{ onGreen }}" disabled="{{ over }}" style="flex:1; cursor:pointer; border:none; padding:20px 0; border-radius:18px; font-family:'Anton',sans-serif; font-size:26px; letter-spacing:1px; color:#06270f; background:linear-gradient(180deg,#3ee07a,#1fae54); box-shadow:0 8px 0 #15823d, 0 14px 22px rgba(34,197,94,.35); transition:transform .08s, box-shadow .08s, opacity .2s;" style-active="transform:translateY(6px); box-shadow:0 2px 0 #15823d, 0 6px 12px rgba(34,197,94,.3);">+1 VERDE</button>
    <button onClick="{{ onRed }}" disabled="{{ over }}" style="flex:1; cursor:pointer; border:none; padding:20px 0; border-radius:18px; font-family:'Anton',sans-serif; font-size:26px; letter-spacing:1px; color:#2a0707; background:linear-gradient(180deg,#fb6a6a,#d22f2f); box-shadow:0 8px 0 #9c2020, 0 14px 22px rgba(239,68,68,.35); transition:transform .08s, box-shadow .08s, opacity .2s;" style-active="transform:translateY(6px); box-shadow:0 2px 0 #9c2020, 0 6px 12px rgba(239,68,68,.3);">+1 ROJO</button>
  </div>

  <!-- Win overlay -->
  <sc-if value="{{ over }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px; backdrop-filter:blur(3px); background:rgba(8,9,12,.55); z-index:20;">
      <div style="position:absolute; inset:0; pointer-events:none; animation:pulsoFlash 1.1s ease-out forwards; background:{{ winGlow }};"></div>
      <sc-for list="{{ confetti }}" as="c" hint-placeholder-count="0">
        <div style="{{ c.style }}"></div>
      </sc-for>
      <div style="animation:pulsoPop .5s cubic-bezier(.34,1.6,.5,1) both; display:flex; flex-direction:column; align-items:center; gap:6px;">
        <div style="font-family:'Anton',sans-serif; font-size:18px; letter-spacing:4px; text-transform:uppercase; color:#7f95a8;">Gana</div>
        <div style="font-family:'Anton',sans-serif; font-size:74px; line-height:.9; text-transform:uppercase; color:{{ winColor }}; text-shadow:0 6px 30px {{ winColor }};">{{ winnerLabel }}</div>
      </div>
      <button onClick="{{ onReset }}" style="cursor:pointer; border:none; padding:16px 38px; border-radius:14px; font-family:'Anton',sans-serif; font-size:22px; letter-spacing:1px; color:#0e151e; background:#c7d5e0; box-shadow:0 6px 0 #7f95a8; transition:transform .08s, box-shadow .08s;" style-active="transform:translateY(4px); box-shadow:0 2px 0 #7f95a8;">Otra vez</button>
    </div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { pos: 0, winner: null, gWins: 0, rWins: 0 };

  leftArm = React.createRef();
  rightArm = React.createRef();
  clasp = React.createRef();
  gripInner = React.createRef();
  fill = React.createRef();
  arena = React.createRef();
  glow = React.createRef();

  componentDidMount() {
    this.applyPose();
    requestAnimationFrame(() => this.applyPose());
  }
  componentDidUpdate() { this.applyPose(); }

  // Geometry in the SVG viewBox space (640 x 340)
  applyPose() {
    const t = Math.max(-1, Math.min(1, this.state.pos / 3));
    const tableY = 290;                       // elbows rest on the table
    const EL = [120, tableY];
    const ER = [520, tableY];
    const C  = [320 + t * 92, 150];           // clasp leans toward the leader
    const REST = 244;                         // forearm rest length

    const place = (ref, E) => {
      if (!ref.current) return;
      const dx = C[0] - E[0], dy = C[1] - E[1];
      const len = Math.sqrt(dx * dx + dy * dy);
      const ang = Math.atan2(dy, dx) * 180 / Math.PI;
      const sx = Math.max(0.6, len / REST);
      ref.current.setAttribute("transform", `translate(${E[0]} ${E[1]}) rotate(${ang}) scale(${sx} 1)`);
    };
    place(this.leftArm, EL);
    place(this.rightArm, ER);

    if (this.clasp.current) {
      this.clasp.current.setAttribute("transform", `translate(${C[0]} ${C[1]}) rotate(${t * 17})`);
    }
    if (this.glow.current) {
      this.glow.current.style.left = (C[0] / 640 * 100) + "%";
      this.glow.current.style.top = (C[1] / 340 * 100) + "%";
      this.glow.current.style.background = t === 0
        ? "radial-gradient(circle, rgba(255,255,255,.06), transparent 70%)"
        : (t > 0
            ? "radial-gradient(circle, rgba(34,197,94," + (0.05 + Math.abs(t) * 0.22) + "), transparent 70%)"
            : "radial-gradient(circle, rgba(239,68,68," + (0.05 + Math.abs(t) * 0.22) + "), transparent 70%)");
    }
    if (this.fill.current) {
      const f = this.fill.current;
      if (this.state.pos >= 0) {
        f.style.left = "50%"; f.style.right = (50 - t * 50) + "%";
        f.style.background = "linear-gradient(90deg,#1c9d4c,#3ee07a)";
      } else {
        f.style.right = "50%"; f.style.left = (50 + t * 50) + "%";
        f.style.background = "linear-gradient(270deg,#cf2f2f,#fb6a6a)";
      }
    }
  }

  ensureAudio() {
    if (!this.ac) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) this.ac = new AC();
    }
    if (this.ac && this.ac.state === "suspended") this.ac.resume();
    return this.ac;
  }

  blip(type, f0, f1, dur, vol, when) {
    const ac = this.ac, t = when;
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type;
    o.frequency.setValueAtTime(f0, t);
    if (f1 !== f0) o.frequency.exponentialRampToValueAtTime(f1, t + dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(ac.destination);
    o.start(t); o.stop(t + dur + 0.02);
  }

  playPush(dir) {
    const ac = this.ensureAudio(); if (!ac) return;
    const t = ac.currentTime;
    const base = dir > 0 ? 300 : 250;
    this.blip("triangle", base, base * 1.6, 0.16, 0.22, t);   // effort grunt
    this.blip("sine", 120, 55, 0.13, 0.32, t);                // body thud
  }

  playWin() {
    const ac = this.ensureAudio(); if (!ac) return;
    const t = ac.currentTime;
    [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => {
      this.blip("triangle", f, f, 0.5, 0.2, t + i * 0.1);
    });
  }

  shake() {
    const a = this.arena.current;
    if (!a) return;
    a.animate(
      [{ transform: "translateX(0)" }, { transform: "translateX(-7px)" }, { transform: "translateX(6px)" }, { transform: "translateX(0)" }],
      { duration: 220, easing: "ease-in-out" }
    );
  }

  squeeze() {
    const g = this.gripInner.current;
    if (!g) return;
    g.animate(
      [{ transform: "scale(1)" }, { transform: "scale(1.12)" }, { transform: "scale(1)" }],
      { duration: 230, easing: "cubic-bezier(.34,1.6,.5,1)" }
    );
  }

  push(dir) {
    if (this.state.winner) return;
    let pos = Math.max(-3, Math.min(3, this.state.pos + dir));
    let winner = null, gWins = this.state.gWins, rWins = this.state.rWins;
    if (pos >= 3) { winner = "green"; gWins++; }
    else if (pos <= -3) { winner = "red"; rWins++; }
    this.playPush(dir);
    this.squeeze();
    this.setState({ pos, winner, gWins, rWins }, () => { if (winner) { this.shake(); this.playWin(); } });
  }

  renderVals() {
    const pos = this.state.pos;
    const winner = this.state.winner;
    const colorFor = w => (w === "green" ? "#22c55e" : "#ef4444");
    const confetti = winner
      ? Array.from({ length: 46 }).map((_, i) => {
          const col = ["#22c55e", "#ef4444", "#c7d5e0", "#facc15"][i % 4];
          const left = Math.round(Math.random() * 100);
          const size = 7 + Math.round(Math.random() * 8);
          const delay = (Math.random() * 0.4).toFixed(2);
          const dur = (1.6 + Math.random() * 1.4).toFixed(2);
          const round = i % 3 === 0 ? "50%" : "2px";
          return { style: `position:absolute; top:-20px; left:${left}%; width:${size}px; height:${size}px; border-radius:${round}; background:${col}; animation:pulsoConfetti ${dur}s linear ${delay}s infinite;` };
        })
      : [];

    return {
      greenScore: Math.max(0, pos),
      redScore: Math.max(0, -pos),
      gWins: this.state.gWins,
      rWins: this.state.rWins,
      over: !!winner,
      winnerLabel: winner === "green" ? "Verde" : (winner === "red" ? "Rojo" : ""),
      winColor: winner ? colorFor(winner) : "#ffffff",
      winGlow: winner === "green"
        ? "radial-gradient(circle at 50% 50%, rgba(34,197,94,.5), transparent 60%)"
        : "radial-gradient(circle at 50% 50%, rgba(239,68,68,.5), transparent 60%)",
      confetti,
      onGreen: () => this.push(1),
      onRed: () => this.push(-1),
      onReset: () => this.setState({ pos: 0, winner: null }),
      leftArmRef: this.leftArm,
      rightArmRef: this.rightArm,
      claspRef: this.clasp,
      gripInnerRef: this.gripInner,
      fillRef: this.fill,
      arenaRef: this.arena,
      glowRef: this.glow,
    };
  }
}
</script>
</body>
</html>
