  componentDidMount(){ this.fit(); this._onR=()=>this.fit(); window.addEventListener('resize',this._onR); this._boot = setTimeout(()=>this.start(this.props.winner==='right'?'right':'left'), 120); }
  componentDidUpdate(prev){
    if(prev.winner !== this.props.winner){ this.start(this.props.winner==='right'?'right':'left'); }
  }
  componentWillUnmount(){ cancelAnimationFrame(this.raf); clearTimeout(this._boot); window.removeEventListener('resize',this._onR); }

  $(id){ const r=this.svgRef.current; return r ? r.querySelector('#'+id) : null; }
  clamp(x){ return x<0?0:(x>1?1:x); }
  ss(x){ x=this.clamp(x); return x*x*(3-2*x); }
  interp(keys,t){
    if(t<=keys[0][0]) return keys[0][1];
    for(let i=1;i<keys.length;i++){ if(t<=keys[i][0]){ const a=keys[i-1],b=keys[i]; const f=this.ss((t-a[0])/(b[0]-a[0])); return a[1]+(b[1]-a[1])*f; } }
    return keys[keys.length-1][1];
  }

  start(side){
    cancelAnimationFrame(this.raf);
    this.side = side;
    const isLeft = side==='left';
    this.winCells = isLeft ? ['L1','L2','L3','L4'] : ['R1','R2','R3','R4'];
    this.loseCells = isLeft ? ['R1','R2','R3'] : ['L1','L2','L3'];
    this.actW = [0.75,1.85,3.05,4.45];
    this.actL = [1.30,2.45,3.65];
    this.tiltSign = isLeft ? -1 : 1;
    this.tiltKeys = [[0,0],[0.75,3.2],[1.30,1.4],[1.85,5.4],[2.45,3.0],[3.05,8.5],[3.65,5.0],[4.45,13],[5.05,21],[5.75,27],[8,27]];
    this.winMoment = 4.65; this.glowFull = 5.85; this.END = 7.4;
    // reset visuals
    ['L1','L2','L3','L4','R1','R2','R3','R4'].forEach(id=>{ const e=this.$(id); if(e) e.setAttribute('fill-opacity','0'); });
    ['L','R'].forEach(s=>{ const g=this.$('glow'+s); if(g) g.setAttribute('opacity','0'); const b=this.$('box'+s); if(b) b.setAttribute('fill','#ffffff'); const v=this.$('vtext'+s); if(v) v.setAttribute('fill','#0e151e'); });
    const arms=this.$('arms'); if(arms) arms.setAttribute('transform','rotate(0 1900 1580)');
    this.t0 = performance.now();
    const loop=(now)=>{ this.frame((now-this.t0)/1000); this.raf=requestAnimationFrame(loop); };
    this.raf = requestAnimationFrame(loop);
  }

  ramp(x){ // 0->1 over 0.42s with slight overshoot
    if(x<=0) return 0;
    const d=x/0.42; if(d>=1) return 1;
    const s=this.ss(d); return s; }

  frame(t){
    const winColor = this.side==='left' ? '#f0c33c' : '#66c0f4';
    const winS = this.side==='left' ? 'L' : 'R';
    // winner cells
    this.winCells.forEach((id,i)=>{ const e=this.$(id); if(e) e.setAttribute('fill-opacity', this.ramp(t-this.actW[i]).toFixed(3)); });
    // loser cells (dim after win moment)
    this.loseCells.forEach((id,i)=>{ const e=this.$(id); if(!e) return; let o=this.ramp(t-this.actL[i]); if(t>this.winMoment){ o*= (1 - 0.78*this.ss((t-this.winMoment)/0.9)); } e.setAttribute('fill-opacity', o.toFixed(3)); });
    // arm tilt
    let tilt = this.interp(this.tiltKeys,t) * this.tiltSign;
    if(t>5.75 && t<6.6){ const k=(t-5.75); tilt += this.tiltSign * Math.sin(k*26) * 2.4 * Math.exp(-k*3.4); }
    const arms=this.$('arms'); if(arms) arms.setAttribute('transform', `rotate(${tilt.toFixed(3)} 1900 1580)`);
    // glow + box fill
    const g = this.clamp((t-this.winMoment)/(this.glowFull-this.winMoment));
    const pulse = 0.72 + 0.28*Math.sin(t*3.4);
    const glow=this.$('glow'+winS); if(glow) glow.setAttribute('opacity', (g*0.85*pulse).toFixed(3));
    const box=this.$('box'+winS); if(box){ const a=g; box.setAttribute('fill', this.side==='left' ? `rgba(214,52,42,${a.toFixed(3)})` : `rgba(47,158,68,${a.toFixed(3)})`); }
    const vt=this.$('vtext'+winS); if(vt) vt.setAttribute('fill', g>0.55 ? '#ffffff' : '#0e151e');
    if(t>this.END){ /* keep looping only for gentle pulse */ }
  }

  renderVals(){
    return {
      svgRef: this.svgRef,
      stageRef: this.stageRef,
      winLeft: ()=>this.start('left'),
      winRight: ()=>this.start('right'),
      replay: ()=>this.start(this.side),
    };
  }
}
</script>
</body>
</html>
