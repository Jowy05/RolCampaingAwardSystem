<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Pulso</title>
<style>
:root{--bg:#0e151e;--card:#1d2c3a;--line:#2b3d4f;--text:#c7d5e0;--muted:#7f95a8;--green:#2f9e44;--red:#e03131;}
*{box-sizing:border-box;} html,body{margin:0;height:100%;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,Segoe UI,Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;gap:12px;padding:16px 12px;text-align:center;}
h1{font-size:22px;margin:0;}
.sub{font-size:12px;color:var(--muted);margin:0;max-width:330px;line-height:1.4;}
.score{display:flex;gap:14px;width:100%;max-width:340px;}
.sc{flex:1;background:var(--card);border:2px solid var(--line);border-radius:12px;padding:8px 6px;}
.sc .n{font-size:30px;font-weight:800;line-height:1;}
.sc .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:3px;}
.sc.g{border-color:var(--green);} .sc.g .n{color:var(--green);}
.sc.r{border-color:var(--red);} .sc.r .n{color:var(--red);}
svg{width:100%;max-width:330px;height:auto;display:block;}
.msg{height:22px;font-weight:800;font-size:15px;}
.btns{display:flex;gap:14px;width:100%;max-width:340px;}
.btn{flex:1;font-size:28px;font-weight:800;color:#fff;border:none;border-radius:16px;padding:26px 0;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.btn.g{background:var(--green);} .btn.r{background:var(--red);}
.btn:active{transform:translateY(3px);filter:brightness(1.12);}
.reset{background:var(--card);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:6px 13px;cursor:pointer;font-size:12.5px;}
</style></head><body>
<h1>💪 Pulso</h1>
<p class="sub">Cada lado empuja. Si el rival va ganando, tu +1 le resta primero (el brazo se rebobina); cuando llega al centro ya empujas tú. Tumba su mano para ganar la ronda.</p>
<div class="score"><div class="sc g"><div class="n" id="wg">0</div><div class="lbl">Verde</div></div><div class="sc r"><div class="n" id="wr">0</div><div class="lbl">Rojo</div></div></div>
<svg viewBox="0 0 300 210" aria-label="pulso">
  <line x1="18" y1="190" x2="282" y2="190" stroke="#2b3d4f" stroke-width="5" stroke-linecap="round"/>
  <line id="armG" x1="64" y1="190" x2="150" y2="92" stroke="#2f9e44" stroke-width="26" stroke-linecap="round"/>
  <line id="armR" x1="236" y1="190" x2="150" y2="92" stroke="#e03131" stroke-width="26" stroke-linecap="round"/>
  <circle id="hand" cx="150" cy="92" r="17" fill="#c7d5e0" stroke="#0e151e" stroke-width="3"/>
  <circle cx="64" cy="190" r="10" fill="#2f9e44"/><circle cx="236" cy="190" r="10" fill="#e03131"/>
</svg>
<div class="msg" id="msg"></div>
<div class="btns"><button class="btn g" id="bg">+1</button><button class="btn r" id="br">+1</button></div>
<button class="reset" id="reset">Reiniciar</button>
<script>
var MAX=5, target=0, disp=0, wg=0, wr=0, lock=false;
var armG=document.getElementById("armG"), armR=document.getElementById("armR"), hand=document.getElementById("hand");
function frame(){
  disp += (target-disp)*0.2;
  if(Math.abs(target-disp)<0.002)disp=target;
  var t=disp/MAX;
  var hx=150 + t*80, hy=92 + Math.abs(t)*72;
  armG.setAttribute("x2",hx); armG.setAttribute("y2",hy);
  armR.setAttribute("x2",hx); armR.setAttribute("y2",hy);
  hand.setAttribute("cx",hx); hand.setAttribute("cy",hy);
  requestAnimationFrame(frame);
}
function win(side){
  var m=document.getElementById("msg");
  if(side==="g"){ wg++; document.getElementById("wg").textContent=wg; m.textContent="Verde gana la ronda!"; m.style.color="var(--green)"; }
  else { wr++; document.getElementById("wr").textContent=wr; m.textContent="Rojo gana la ronda!"; m.style.color="var(--red)"; }
  setTimeout(function(){ target=0; lock=false; if(m.textContent.indexOf("gana")>=0)m.textContent=""; },1100);
}
function push(dir){
  if(lock)return;
  target+=dir;
  if(target>=MAX){ target=MAX; lock=true; win("g"); }
  else if(target<=-MAX){ target=-MAX; lock=true; win("r"); }
}
document.getElementById("bg").onclick=function(){push(1);};
document.getElementById("br").onclick=function(){push(-1);};
document.getElementById("reset").onclick=function(){target=0;disp=0;wg=0;wr=0;document.getElementById("wg").textContent=0;document.getElementById("wr").textContent=0;document.getElementById("msg").textContent="";lock=false;};
requestAnimationFrame(frame);
</script></body></html>
